server {
    listen 80;
    listen [::]:80;
    server_name dev.arthurlunkes.com.br arthurlunkes.com.br www.arthurlunkes.com.br;

    # Static build produced by `npm run build`
    root /root/portfolio-arthur_lunkes/build;
    index index.html;

    # gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/manifest+json;

    # Long-lived cache for hashed static assets (CRA emits content-hashed filenames)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # SPA fallback: every unknown route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html should never be cached, so new deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # After obtaining a certificate (e.g. `sudo certbot --nginx -d dev.arthurlunkes.com.br`),
    # certbot appends the HTTPS server block and the HTTP -> HTTPS redirect automatically.
}
